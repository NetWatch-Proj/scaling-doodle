apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.instance.name }}-secrets
type: Opaque
stringData:
  # Model provider API keys (populate based on config.modelProvider)
  ZAI_API_KEY: {{ .Values.secrets.zaiApiKey | default "" }}
  SYNTHETIC_API_KEY: {{ .Values.secrets.syntheticApiKey | default "" }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | default "" }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | default "" }}
  GOOGLE_API_KEY: {{ .Values.secrets.googleApiKey | default "" }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openRouterApiKey | default "" }}
  # Channel tokens
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | default "" }}
  DISCORD_BOT_TOKEN: {{ .Values.secrets.discordBotToken | default "" }}
  SLACK_BOT_TOKEN: {{ .Values.secrets.slackBotToken | default "" }}
  SLACK_APP_TOKEN: {{ .Values.secrets.slackAppToken | default "" }}
