apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.instance.name }}
  labels:
    app: {{ .Values.instance.name }}
    tier: {{ .Values.instance.tier }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.instance.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.instance.name }}
    spec:
      initContainers:
        - name: copy-config
          image: busybox:1.36
          env:
            - name: ZAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.instance.name }}-secrets
                  key: ZAI_API_KEY
            - name: GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.instance.name }}-secrets
                  key: GATEWAY_TOKEN
          command:
            - sh
            - -c
            - |
              mkdir -p /home/node/.openclaw
              # Use sed to replace environment variables (more reliable than awk for this)
              sed -e "s|\\\${ZAI_API_KEY}|${ZAI_API_KEY}|g" \
                  -e "s|\\\${GATEWAY_TOKEN}|${GATEWAY_TOKEN}|g" \
                  /tmp/config/openclaw.json > /home/node/.openclaw/openclaw.json
              # Verify config was written
              if [ ! -s /home/node/.openclaw/openclaw.json ]; then
                echo "ERROR: Config file is empty"
                exit 1
              fi
              echo "Config file created successfully"
              head -5 /home/node/.openclaw/openclaw.json
              chown -R 1000:1000 /home/node/.openclaw
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /tmp/config
      containers:
        - name: openclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 18789
          envFrom:
            - configMapRef:
                name: {{ .Values.instance.name }}-config
            - secretRef:
                name: {{ .Values.instance.name }}-secrets
          volumeMounts:
            - name: data
              mountPath: /home/node/.openclaw
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 18789
            initialDelaySeconds: 60
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /readyz
              port: 18789
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
      volumes:
        - name: data
        {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.instance.name }}-pvc
        {{- else }}
          emptyDir: {}
        {{- end }}
        - name: config
          configMap:
            name: {{ .Values.instance.name }}-config
