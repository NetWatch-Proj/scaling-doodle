kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: openclaw-platform
nodes:
  - role: control-plane
    extraPortMappings:
      # OpenClaw instances (Gateway WebSocket)
      - containerPort: 31880
        hostPort: 18789
        protocol: TCP
      # Additional OpenClaw instances
      - containerPort: 31881
        hostPort: 18790
        protocol: TCP
  - role: worker
  - role: worker
