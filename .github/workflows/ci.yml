name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.filter.outputs.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            platform:
              - 'apps/platform/**'
              - '.github/workflows/platform-ci.yml'

  platform-ci:
    name: Platform CI
    needs: check-changes
    if: ${{ needs.check-changes.outputs.platform == 'true' }}
    uses: ./.github/workflows/platform-ci.yml
    with:
      ref: ${{ github.sha }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  wait-for-codecov:
    name: Wait for Codecov
    needs:
      - check-changes
      - platform-ci
    if: ${{ needs.check-changes.outputs.platform == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Codecov status
        uses: actions/github-script@v7
        with:
          script: |
            const maxAttempts = 60;
            const delayMs = 10000;

            for (let i = 0; i < maxAttempts; i++) {
              // Check both Check Runs and Commit Statuses
              const [checks, statuses] = await Promise.all([
                github.rest.checks.listForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: context.sha
                }),
                github.rest.repos.listCommitStatusesForRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: context.sha
                })
              ]);

              console.log('Check runs:', checks.data.check_runs.map(c => `${c.name} (${c.status}/${c.conclusion})`));
              console.log('Statuses:', statuses.data.map(s => `${s.context} (${s.state})`));

              // Check Check Runs
              const codecovCheck = checks.data.check_runs.find(check =>
                check.name.toLowerCase().includes('codecov') || check.app?.slug === 'codecov'
              );

              if (codecovCheck) {
                console.log(`Found Codecov check run: ${codecovCheck.name}, status: ${codecovCheck.status}, conclusion: ${codecovCheck.conclusion}`);
                if (codecovCheck.status === 'completed') {
                  if (codecovCheck.conclusion === 'success') {
                    console.log('Codecov check run reported success');
                    return;
                  }
                  core.setFailed(`Codecov check run reported: ${codecovCheck.conclusion}`);
                  return;
                }
              }

              // Check Commit Statuses
              const codecovStatus = statuses.data.find(s =>
                s.context.toLowerCase().includes('codecov') || s.context.startsWith('codecov/')
              );

              if (codecovStatus) {
                console.log(`Found Codecov status: ${codecovStatus.context}, state: ${codecovStatus.state}`);
                if (codecovStatus.state === 'success') {
                  console.log('Codecov status reported success');
                  return;
                }
                if (codecovStatus.state === 'failure' || codecovStatus.state === 'error') {
                  core.setFailed(`Codecov status reported: ${codecovStatus.state}`);
                  return;
                }
              }

              console.log(`Waiting for Codecov... (${i + 1}/${maxAttempts})`);
              await new Promise(r => setTimeout(r, delayMs));
            }

            core.setFailed('Timeout waiting for Codecov');

  ci-complete:
    name: CI Complete
    needs:
      - check-changes
      - platform-ci
      - wait-for-codecov
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.platform-ci.result }}" = "failure" ]; then
            echo "Platform CI failed"
            exit 1
          fi
          if [ "${{ needs.platform-ci.result }}" = "cancelled" ]; then
            echo "Platform CI was cancelled"
            exit 1
          fi
          if [ "${{ needs.wait-for-codecov.result }}" = "failure" ]; then
            echo "Codecov check failed"
            exit 1
          fi
          if [ "${{ needs.wait-for-codecov.result }}" = "cancelled" ]; then
            echo "Codecov check was cancelled"
            exit 1
          fi
          echo "All CI checks passed or were not needed"
