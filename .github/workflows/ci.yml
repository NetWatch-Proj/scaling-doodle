name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.filter.outputs.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            platform:
              - 'apps/platform/**'
              - '.github/workflows/platform-ci.yml'

  platform-ci:
    name: Platform CI
    needs: check-changes
    if: ${{ needs.check-changes.outputs.platform == 'true' }}
    uses: ./.github/workflows/platform-ci.yml
    with:
      ref: ${{ github.sha }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  wait-for-codecov:
    name: Wait for Codecov
    needs:
      - check-changes
      - platform-ci
    if: ${{ needs.check-changes.outputs.platform == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Codecov status
        uses: actions/github-script@v7
        with:
          script: |
            const maxAttempts = 60;
            const delayMs = 10000;

            for (let i = 0; i < maxAttempts; i++) {
              const checks = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: context.sha
              });

              const codecovCheck = checks.data.check_runs.find(check =>
                check.name.toLowerCase().includes('codecov')
              );

              if (codecovCheck) {
                if (codecovCheck.status === 'completed') {
                  if (codecovCheck.conclusion === 'success') {
                    console.log('Codecov reported success');
                    return;
                  }
                  core.setFailed(`Codecov reported: ${codecovCheck.conclusion}`);
                  return;
                }
                console.log(`Codecov status: ${codecovCheck.status}`);
              }

              console.log(`Waiting for Codecov... (${i + 1}/${maxAttempts})`);
              await new Promise(r => setTimeout(r, delayMs));
            }

            core.setFailed('Timeout waiting for Codecov');

  ci-complete:
    name: CI Complete
    needs:
      - check-changes
      - platform-ci
      - wait-for-codecov
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs passed
        run: |
          if [ "${{ needs.platform-ci.result }}" = "failure" ]; then
            echo "Platform CI failed"
            exit 1
          fi
          if [ "${{ needs.platform-ci.result }}" = "cancelled" ]; then
            echo "Platform CI was cancelled"
            exit 1
          fi
          if [ "${{ needs.wait-for-codecov.result }}" = "failure" ]; then
            echo "Codecov check failed"
            exit 1
          fi
          if [ "${{ needs.wait-for-codecov.result }}" = "cancelled" ]; then
            echo "Codecov check was cancelled"
            exit 1
          fi
          echo "All CI checks passed or were not needed"
