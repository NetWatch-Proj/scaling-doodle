name: Platform CI

on:
  workflow_call:
    inputs:
      ref:
        description: 'Git ref to checkout'
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        required: true

env:
  MIX_ENV: test
  ELIXIR_VERSION: '1.19.5'
  OTP_VERSION: '27'

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:18
        ports: ['5432:5432']
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: scaling_doodle_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: apps/platform

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            apps/platform/deps
            apps/platform/_build
          key: ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-${{ hashFiles('apps/platform/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-

      - name: Install dependencies
        run: mix deps.get --only $MIX_ENV

      - name: Compile project
        run: mix compile --warnings-as-errors

      - name: Run linters
        run: mix lint.ci

      - name: Run tests
        run: mix test
